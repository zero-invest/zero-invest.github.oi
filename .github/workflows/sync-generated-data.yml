name: Sync Generated Data

on:
  workflow_dispatch:
  schedule:
    # Beijing time is UTC+8.
    # Day session: 09:00-16:59 CST, every 5 minutes.
    - cron: '*/5 1-8 * * 1-5'
    # US night session: 21:00-04:59 CST, every 5 minutes.
    - cron: '*/5 13-20 * * 1-5'
    # Off-session gap on weekdays: 17:00-20:59 CST, every 30 minutes.
    - cron: '*/30 9-12 * * 1-5'
    # Weekend maintenance refresh, every 2 hours.
    - cron: '0 */2 * * 0,6'

permissions:
  contents: write

concurrency:
  group: sync-generated-data
  # Keep scheduled runs from canceling each other mid-sync.
  # If one run takes longer than 5 minutes, canceling in-progress runs can
  # prevent commits from ever reaching origin/main.
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Fund Sync Cache
        id: fund-sync-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fund-sync-${{ github.ref_name }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Sync GitHub Traffic
        run: npm run sync:github-traffic
        env:
          GH_TRAFFIC_REPO: ${{ github.repository }}
          GH_TRAFFIC_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN }}
          GH_TRAFFIC_SNAPSHOT_HOUR_CST: '12'
          GH_TRAFFIC_SNAPSHOT_WINDOW_MINUTES: '20'

      - name: Sync Funds Runtime Data (fast market-focused)
        run: node scripts/sync-funds.mjs
        env:
          # Keep high-frequency runs lightweight: refresh market quotes for all funds,
          # skip heavy disclosed-holdings intraday refresh, and batch model updates.
          SYNC_BATCH_SIZE: '6'
          SYNC_SKIP_REALTIME_HOLDINGS: '1'

      - name: Sync Funds Runtime Data (full detail every 60 minutes)
        run: |
          MINUTE=$(date -u +'%M')
          if [ $((10#$MINUTE % 60)) -eq 0 ]; then
            SYNC_BATCH_SIZE=9999 node scripts/sync-funds.mjs
          else
            echo "Skip full-detail runtime sync on minute ${MINUTE}; fast market-focused mode already completed."
          fi

      - name: Sync Premium Compare (every 30 minutes)
        run: |
          MINUTE=$(date -u +'%M')
          if [ $((10#$MINUTE % 30)) -eq 0 ]; then
            node scripts/sync-premium-compare.mjs
          else
            echo "Skip premium compare on minute ${MINUTE}; runtime-only refresh this round."
          fi

      - name: Export Cloudflare Runtime SQL
        run: npm run cloudflare:runtime:sql

      - name: Sync Cloudflare D1 Runtime
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skip Cloudflare D1 sync."
            exit 0
          fi
          npx wrangler d1 execute premium-runtime-db --remote --config cloudflare/worker/wrangler.toml --file .cache/cloudflare/runtime-upsert.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Cloudflare Worker
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skip Cloudflare Worker deploy."
            exit 0
          fi
          npx wrangler deploy --config cloudflare/worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Save Fund Sync Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}

      - name: Commit Generated Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/generated/*.json
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi
          git commit -m "chore(auto): refresh runtime data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Rebase and Push
        run: |
          git pull --rebase origin main
          git push origin HEAD:main
