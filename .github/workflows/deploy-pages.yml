name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # 只有代码文件变更才触发重新构建，纯数据更新不触发
    paths-ignore:
      - 'public/generated/**'
      - '.cache/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Fund Sync Cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fund-sync-${{ github.ref_name }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Sync Funds Runtime Data
        run: npm run sync:data

      - name: Build Site
        env:
          VITE_RUNTIME_API_BASE: https://api.leo2026.cloud/api/runtime
        run: npm run build:static

      - name: Save Fund Sync Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
