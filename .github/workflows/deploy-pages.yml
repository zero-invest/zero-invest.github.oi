name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'public/generated/**'
  workflow_run:
    workflows:
      - Sync Generated Data
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Separate push and schedule queues so scheduled data refresh does not cancel code deployment.
  group: pages-${{ github.event_name }}
  # Only push runs should preempt older push runs; scheduled runs should not preempt deployments.
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Fund Sync Cache
        id: fund-sync-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fund-sync-${{ github.ref_name }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Sync GitHub Traffic
        run: npm run sync:github-traffic
        env:
          GH_TRAFFIC_REPO: ${{ github.repository }}
          GH_TRAFFIC_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN }}
          GH_TRAFFIC_SNAPSHOT_HOUR_CST: '12'
          GH_TRAFFIC_SNAPSHOT_WINDOW_MINUTES: '20'

      - name: Sync Funds Runtime Data
        run: npm run sync:data

      - name: Build Site
        run: npm run build:static

      - name: Export Cloudflare Runtime SQL
        run: npm run cloudflare:runtime:sql

      - name: Sync Cloudflare D1 Runtime
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skip Cloudflare D1 sync."
            exit 0
          fi
          npx wrangler d1 execute premium-runtime-db --remote --config cloudflare/worker/wrangler.toml --file .cache/cloudflare/runtime-upsert.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Cloudflare Worker
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skip Cloudflare Worker deploy."
            exit 0
          fi
          npx wrangler deploy --config cloudflare/worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Save Fund Sync Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
