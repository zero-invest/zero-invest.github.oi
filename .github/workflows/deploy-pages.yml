name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 1-3,5-7,13-21 * * 1-5'
    - cron: '*/15 0,4,8-12,22-23 * * 1-5'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Fund Sync Cache
        id: fund-sync-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fund-sync-${{ github.ref_name }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Site
        run: npm run build

      - name: Save Fund Sync Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
