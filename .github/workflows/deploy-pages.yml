name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Workdays only (Mon-Fri). Beijing time is UTC+8.
    # Day session: 09:00-15:55 CST, every 5 minutes.
    - cron: '*/5 1-7 * * 1-5'
    # Day session close tick: 16:00 CST.
    - cron: '0 8 * * 1-5'
    # US night session (for future automation): 21:30-23:59 CST, every 10 minutes.
    - cron: '30-59/10 13 * * 1-5'
    - cron: '*/10 14-15 * * 1-5'
    # US night session (cross-day): 00:00-04:00 CST, every 10 minutes.
    - cron: '*/10 16-20 * * 1-5'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Fund Sync Cache
        id: fund-sync-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fund-sync-${{ github.ref_name }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Sync GitHub Traffic
        run: npm run sync:github-traffic
        env:
          GH_TRAFFIC_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Site
        run: npm run build:static

      - name: Save Fund Sync Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
