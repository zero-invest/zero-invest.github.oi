name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Beijing time is UTC+8.
    # Day session: 09:00-16:59 CST, every 5 minutes.
    - cron: '*/5 1-8 * * *'
    # US night session: 21:00-04:59 CST, every 5 minutes.
    - cron: '*/5 13-20 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Fund Sync Cache
        id: fund-sync-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fund-sync-${{ github.ref_name }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Sync GitHub Traffic
        run: npm run sync:github-traffic
        env:
          GH_TRAFFIC_REPO: ${{ github.repository }}
          GH_TRAFFIC_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN }}

      - name: Sync Funds Runtime Data
        run: npm run sync:data

      - name: Build Site
        run: npm run build:static

      - name: Save Fund Sync Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/fund-sync
          key: fund-sync-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
