<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 本地测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #1a202c;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #2d3748;
      font-weight: 500;
      font-size: 0.875rem;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .success {
      background: #c6f6d5;
      color: #22543d;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .info {
      background: #bee3f8;
      color: #2c5282;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .info strong {
      color: #1a365d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 后台管理登录</h1>
    <p class="subtitle">本地开发测试环境</p>
    
    <div id="message"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">管理员账号</label>
        <input type="text" id="username" name="username" placeholder="请输入管理员账号" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">管理员密码</label>
        <input type="password" id="password" name="password" placeholder="请输入管理员密码" required autocomplete="current-password">
      </div>
      
      <button type="submit" id="submitBtn">登录</button>
    </form>
    
    <div class="info">
      <strong>💡 本地测试说明：</strong><br>
      • 此页面仅用于本地开发环境测试<br>
      • 默认账号：<code>admin</code><br>
      • 默认密码：<code>admin123</code><br>
      • 生产环境请使用独立的认证系统<br>
      • 登录成功后将跳转到后台管理界面
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      messageDiv.innerHTML = '';
      
      try {
        // 本地测试：简单验证
        if (username === 'admin' && password === 'admin123') {
          // 模拟登录成功
          localStorage.setItem('admin_user', JSON.stringify({
            username: 'admin',
            role: 'admin',
            loginTime: new Date().toISOString()
          }));
          
          messageDiv.innerHTML = '<div class="success">✅ 登录成功！正在跳转...</div>';
          
          setTimeout(() => {
            window.location.href = '/admin/';
          }, 1000);
        } else {
          throw new Error('账号或密码错误');
        }
      } catch (error) {
        messageDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
