name = "lof-premium-rate-web-api"
main = "src/index.js"
compatibility_date = "2026-03-25"
workers_dev = true

account_id = "d7c991c802a060808a087df47823f3fa"

[vars]
# 自主同步引擎配置
# Worker 将直接从数据源（天天基金、新浪等）抓取数据，不再依赖此外部落户
GENERATED_SOURCE_BASE_URL = "https://premium.leo2026.cloud/"
# 减少同步间隔到1分钟，确保数据更及时
RUNTIME_SYNC_MIN_INTERVAL_MINUTES = "1"

# 手动同步令牌（临时用于调试）
RUNTIME_SYNC_TOKEN = "debug-sync-token"

[triggers]
# 每分钟执行一次同步，确保数据更及时
crons = ["* * * * *"]

[[d1_databases]]
binding = "RUNTIME_DB"
database_name = "premium-runtime-db"
database_id = "e402561c-0aa2-4618-90f6-6bf007220683"

[[r2_buckets]]
binding = "ORDER_SCREENSHOT_BUCKET"
bucket_name = "premium-order-screenshots"
